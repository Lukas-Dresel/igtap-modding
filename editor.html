<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IGTAP Level Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', monospace; display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 280px; min-width: 280px; background: #16213e; border-right: 1px solid #0f3460;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar h2 { padding: 12px; font-size: 14px; background: #0f3460; text-align: center; }
#level-select { padding: 8px; border-bottom: 1px solid #0f3460; }
#level-select select { width: 100%; padding: 4px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; }
#layer-list { flex: 1; overflow-y: auto; padding: 4px; }
.layer-item {
  display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px;
  cursor: pointer; font-size: 12px; border: 1px solid transparent;
}
.layer-item:hover { background: #1a1a2e; }
.layer-item.active { border-color: #e94560; background: #1a1a2e; }
.layer-item.loading { opacity: 0.5; }
.layer-eye { width: 18px; height: 18px; cursor: pointer; text-align: center; line-height: 18px; font-size: 14px; }
.layer-eye.hidden { opacity: 0.3; }
.layer-color { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layer-count { font-size: 10px; color: #888; flex-shrink: 0; }

#toolbar {
  padding: 6px; border-bottom: 1px solid #0f3460; display: flex; flex-wrap: wrap; gap: 4px;
}
.tool-btn {
  padding: 4px 8px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0;
  border-radius: 3px; cursor: pointer; font-size: 11px;
}
.tool-btn.active { background: #e94560; border-color: #e94560; }
.tool-btn:hover { background: #0f3460; }

#main { flex: 1; display: flex; flex-direction: column; position: relative; }
#top-bar {
  height: 32px; background: #16213e; border-bottom: 1px solid #0f3460;
  display: flex; align-items: center; padding: 0 12px; gap: 12px; font-size: 12px;
}
#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas { position: absolute; top: 0; left: 0; }
#status { height: 24px; background: #16213e; border-top: 1px solid #0f3460; padding: 0 12px; font-size: 11px; line-height: 24px; color: #888; }

#props {
  width: 240px; min-width: 240px; background: #16213e; border-left: 1px solid #0f3460;
  overflow-y: auto; padding: 8px; font-size: 12px;
}
#props h3 { margin-bottom: 8px; font-size: 13px; color: #e94560; }
.prop-row { display: flex; justify-content: space-between; padding: 2px 0; }
.prop-label { color: #888; }
.prop-val { color: #e0e0e0; font-family: monospace; }

#sprite-preview { max-width: 100%; image-rendering: pixelated; margin-top: 8px; border: 1px solid #0f3460; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>IGTAP Level Editor</h2>
  <div id="level-select">
    <select id="level-picker">
      <option value="0">Level 0 (17 layers)</option>
      <option value="1" selected>Level 1 (21 layers)</option>
    </select>
  </div>
  <div id="toolbar">
    <button class="tool-btn active" data-tool="select" title="Select (V)">&#9754; Select</button>
    <button class="tool-btn" data-tool="pan" title="Pan (H)">&#9995; Pan</button>
    <button class="tool-btn" data-tool="paint" title="Paint (B)">&#9998; Paint</button>
    <button class="tool-btn" data-tool="erase" title="Erase (E)">&#10060; Erase</button>
  </div>
  <div id="layer-list"></div>
</div>

<div id="main">
  <div id="top-bar">
    <span>Zoom: <span id="zoom-label">100%</span></span>
    <span>Grid: <input type="checkbox" id="grid-toggle" checked> </span>
    <span>Tile: <span id="tile-id-label">-</span></span>
    <span id="coord-label">-</span>
    <span>Objects: <input type="checkbox" id="objects-toggle" checked></span>
    <span>Labels: <input type="checkbox" id="labels-toggle" checked></span>
    <span>Sprites: <span id="sprite-load-label">-</span></span>
  </div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="status">Ready. WASD/Arrows or middle-drag to pan, scroll to zoom. Ctrl+S to export.</div>
</div>

<div id="props">
  <h3>Properties</h3>
  <div id="props-content">Select a tile or layer to see properties.</div>
</div>

<script>
const DATA_DIR = 'decomp/output';
const TILE_SIZE = 1;

// Fallback colors when sprites haven't loaded yet
const LAYER_COLORS = {
  'ground': '#4a9eff', 'Spikes': '#ff4444', 'hiddenSpikes': '#ff6666',
  'blueSpikes': '#4488ff', 'orangeSpikes': '#ff8844', 'blueBlocks': '#2266dd',
  'orangeBlocks': '#dd8822', 'Background': '#335566', 'Environmental objects': '#44aa66',
  'Environmental objects_back': '#337744', 'environmentalObjects_front': '#66cc88',
  'Ilusorywalls': '#aa44aa', 'InvisibleWall': '#884488', 'lightBlocker': '#666633',
  'OOB areas': '#333333', 'moss': '#556633',
  'Tree1Ground': '#228833', 'Tree2Ground': '#33aa44', 'Tree3Ground': '#44cc55',
  'backgroundSpikes1': '#cc6666', 'backgroundSpikes2': '#cc6666',
};
const DEFAULT_COLOR = '#7799aa';

// ===== STATE =====
let layerIndex = [];
let layers = {};           // file -> layer data
let layerVisible = {};     // path_id -> bool
let layerOrder = [];       // current level's layer info objects (not just names)
let activeLayerPathId = null;
let currentLevel = 0;
let tool = 'select';

// Sprite system
let spriteIndex = {};      // path_id -> { name, level, sprites: { idx: "path" } }
let spriteImages = {};     // image path -> HTMLImageElement (loaded)
let spriteLoadQueue = [];
let spritesLoading = 0;
let spritesLoaded = 0;
let spritesTotal = 0;
const MAX_CONCURRENT_LOADS = 50;

// Camera
let cam = { x: 0, y: 0, zoom: 4 };
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camStart = { x: 0, y: 0 };

// Canvas
let canvas, ctx, canvasW, canvasH;
let renderQueued = false;

// Scene objects (non-tilemap: upgrade boxes, checkpoints, springs, etc.)
let sceneObjects = [];      // current level's objects
let sceneObjectImages = {}; // sprite path -> Image
let showSceneObjects = true;

// Selection
let selectedTile = null;
let selectedObject = null;
let hoverTile = null;

// ===== INIT =====
async function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  // Load data files in parallel
  const [indexRes, spriteRes, objRes0, objRes1] = await Promise.all([
    fetch(`${DATA_DIR}/layer_index.json`),
    fetch(`${DATA_DIR}/tilemap_sprite_index.json`),
    fetch(`${DATA_DIR}/scene_objects_level0.json`),
    fetch(`${DATA_DIR}/scene_objects_level1.json`),
  ]);
  layerIndex = await indexRes.json();
  spriteIndex = await spriteRes.json();
  window._sceneObjectsByLevel = [await objRes0.json(), await objRes1.json()];

  setupLevelPicker();
  setupTools();
  setupInput();
  loadLevel(1);  // level1 has more complete data (21 layers, trees, moss)
}

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvasW = wrap.clientWidth;
  canvasH = wrap.clientHeight;
  canvas.width = canvasW;
  canvas.height = canvasH;
  queueRender();
}

function queueRender() {
  if (!renderQueued) {
    renderQueued = true;
    requestAnimationFrame(() => { renderQueued = false; render(); });
  }
}

// ===== SPRITE LOADING =====
function getSpriteImage(pathId, spriteIdx) {
  const entry = spriteIndex[String(pathId)];
  if (!entry) return null;
  const imgPath = entry.sprites[String(spriteIdx)];
  if (!imgPath) return null;

  const fullPath = `${DATA_DIR}/${imgPath}`;
  if (spriteImages[fullPath]) {
    const img = spriteImages[fullPath];
    return img.complete && img.naturalWidth > 0 ? img : null;
  }

  // Queue for loading
  spriteImages[fullPath] = null; // mark as queued
  spriteLoadQueue.push(fullPath);
  pumpSpriteLoader();
  return null;
}

function pumpSpriteLoader() {
  while (spritesLoading < MAX_CONCURRENT_LOADS && spriteLoadQueue.length > 0) {
    const path = spriteLoadQueue.shift();
    if (spriteImages[path] instanceof Image) continue; // already loading/loaded
    spritesLoading++;
    spritesTotal++;
    const img = new Image();
    img.onload = () => {
      spritesLoading--;
      spritesLoaded++;
      updateSpriteLabel();
      queueRender();
      pumpSpriteLoader();
    };
    img.onerror = () => {
      spritesLoading--;
      spritesLoaded++;
      pumpSpriteLoader();
    };
    img.src = path;
    spriteImages[path] = img;
  }
}

function updateSpriteLabel() {
  document.getElementById('sprite-load-label').textContent =
    `${spritesLoaded}/${spritesTotal}`;
}

// ===== LEVEL LOADING =====
function setupLevelPicker() {
  document.getElementById('level-picker').addEventListener('change', (e) => {
    loadLevel(parseInt(e.target.value));
  });
}

async function loadLevel(levelIdx) {
  currentLevel = levelIdx;
  const levelLayers = layerIndex.filter(l => l.level === levelIdx);
  layerOrder = levelLayers;
  // Always use level1 scene objects — level0 has broken positions
  // (course objects are root transforms without the Courses parent offset)
  sceneObjects = window._sceneObjectsByLevel ? window._sceneObjectsByLevel[1] || [] : [];

  // Preload scene object sprites
  for (const obj of sceneObjects) {
    if (obj.sprite && !sceneObjectImages[obj.sprite]) {
      const img = new Image();
      img.src = `${DATA_DIR}/${obj.sprite}`;
      img.onload = () => queueRender();
      sceneObjectImages[obj.sprite] = img;
    }
  }

  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  for (const info of levelLayers) {
    const color = LAYER_COLORS[info.name] || DEFAULT_COLOR;
    if (!(info.path_id in layerVisible)) layerVisible[info.path_id] = true;

    const div = document.createElement('div');
    div.className = 'layer-item loading';
    div.dataset.pathId = info.path_id;
    div.dataset.file = info.file;
    div.innerHTML = `
      <span class="layer-eye ${layerVisible[info.path_id] ? '' : 'hidden'}" data-pid="${info.path_id}">&#128065;</span>
      <span class="layer-color" style="background:${color}"></span>
      <span class="layer-name" title="${info.name}">${info.name}</span>
      <span class="layer-count">${info.tile_count.toLocaleString()}</span>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('layer-eye')) return;
      selectLayer(info.path_id);
    });
    div.querySelector('.layer-eye').addEventListener('click', () => toggleVis(info.path_id));
    list.appendChild(div);
  }

  // Center camera
  const bboxes = levelLayers.filter(l => l.bbox);
  if (bboxes.length) {
    const minX = Math.min(...bboxes.map(l => l.bbox.min_x));
    const maxX = Math.max(...bboxes.map(l => l.bbox.max_x));
    const minY = Math.min(...bboxes.map(l => l.bbox.min_y));
    const maxY = Math.max(...bboxes.map(l => l.bbox.max_y));
    cam.x = (minX + maxX) / 2;
    cam.y = (minY + maxY) / 2;
    cam.zoom = Math.min(canvasW / (maxX - minX + 20), canvasH / (maxY - minY + 20));
  }
  document.getElementById('zoom-label').textContent = Math.round(cam.zoom * 100) + '%';

  // Load layer tile data (small first for progressive display)
  const sorted = [...levelLayers].sort((a, b) => a.tile_count - b.tile_count);
  queueRender();
  for (const info of sorted) {
    if (!layers[info.file]) {
      try {
        const res = await fetch(`${DATA_DIR}/${info.file}`);
        layers[info.file] = await res.json();
      } catch (e) {
        console.error(`Failed to load ${info.file}:`, e);
        layers[info.file] = { tiles: [] };
      }
    }
    const el = document.querySelector(`.layer-item[data-path-id="${info.path_id}"]`);
    if (el) el.classList.remove('loading');
    queueRender();
  }

  if (layerOrder.length && !activeLayerPathId) selectLayer(layerOrder[0].path_id);
  setStatus(`Level ${levelIdx}: ${levelLayers.length} layers, ${levelLayers.reduce((s, l) => s + l.tile_count, 0).toLocaleString()} tiles`);
}

function selectLayer(pathId) {
  activeLayerPathId = pathId;
  document.querySelectorAll('.layer-item').forEach(el => {
    el.classList.toggle('active', el.dataset.pathId == pathId);
  });
  updateProps();
  queueRender();
}

function toggleVis(pathId) {
  layerVisible[pathId] = !layerVisible[pathId];
  const eye = document.querySelector(`.layer-eye[data-pid="${pathId}"]`);
  if (eye) eye.classList.toggle('hidden', !layerVisible[pathId]);
  queueRender();
}

// ===== TOOLS =====
function setupTools() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      tool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

// ===== INPUT =====
function setupInput() {
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('mouseleave', onMouseUp);
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', onKeyDown);
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - canvasW / 2) / cam.zoom + cam.x,
    y: -(sy - canvasH / 2) / cam.zoom + cam.y
  };
}
function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + canvasW / 2,
    y: -(wy - cam.y) * cam.zoom + canvasH / 2
  };
}
function worldToTile(wx, wy) {
  return { x: Math.floor(wx), y: Math.floor(wy) };
}

function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.85 : 1.18;
  const oldZoom = cam.zoom;
  cam.zoom = Math.max(0.1, Math.min(200, cam.zoom * factor));
  const world = screenToWorld(e.offsetX, e.offsetY);
  cam.x += (world.x - cam.x) * (1 - oldZoom / cam.zoom);
  cam.y += (world.y - cam.y) * (1 - oldZoom / cam.zoom);
  document.getElementById('zoom-label').textContent = Math.round(cam.zoom * 100) + '%';
  queueRender();
}

function onMouseDown(e) {
  if (e.button === 1 || e.button === 2 || tool === 'pan') {
    isDragging = true;
    dragStart = { x: e.offsetX, y: e.offsetY };
    camStart = { x: cam.x, y: cam.y };
    canvas.style.cursor = 'grabbing';
    return;
  }
  const world = screenToWorld(e.offsetX, e.offsetY);
  const tile = worldToTile(world.x, world.y);
  if (tool === 'select') { selectTileAt(tile.x, tile.y); selectObjectAt(world.x, world.y); }
  if (tool === 'paint') paintTile(tile.x, tile.y);
  if (tool === 'erase') eraseTile(tile.x, tile.y);
}

function onMouseMove(e) {
  const world = screenToWorld(e.offsetX, e.offsetY);
  const tile = worldToTile(world.x, world.y);
  hoverTile = tile;
  document.getElementById('coord-label').textContent = `(${tile.x}, ${tile.y})`;

  if (isDragging) {
    cam.x = camStart.x - (e.offsetX - dragStart.x) / cam.zoom;
    cam.y = camStart.y + (e.offsetY - dragStart.y) / cam.zoom;
    queueRender();
    return;
  }
  if (e.buttons === 1) {
    if (tool === 'paint') paintTile(tile.x, tile.y);
    if (tool === 'erase') eraseTile(tile.x, tile.y);
  }
  const info = getTileAt(tile.x, tile.y);
  document.getElementById('tile-id-label').textContent = info
    ? `idx:${tTileIdx(info)} spr:${tSpriteIdx(info)} mat:${tMatrixIdx(info)}` : '-';
  queueRender();
}

function onMouseUp() {
  isDragging = false;
  canvas.style.cursor = '';
}

function onKeyDown(e) {
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportLevel(); return; }
  const PAN = 20 / cam.zoom;
  switch (e.key) {
    case 'ArrowLeft': case 'a': cam.x -= PAN; queueRender(); break;
    case 'ArrowRight': case 'd': cam.x += PAN; queueRender(); break;
    case 'ArrowUp': case 'w': cam.y += PAN; queueRender(); break;
    case 'ArrowDown': case 's': cam.y -= PAN; queueRender(); break;
    case 'v': setTool('select'); break;
    case 'h': setTool('pan'); break;
    case 'b': setTool('paint'); break;
    case 'e': setTool('erase'); break;
    case '=': case '+': cam.zoom *= 1.2; queueRender(); break;
    case '-': cam.zoom /= 1.2; queueRender(); break;
    case '0': cam.zoom = 4; queueRender(); break;
  }
}

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
}

// ===== TILE OPS =====
function getLayerData(info) {
  return layers[info.file] || null;
}

// Access tile fields (compact keys: si, mi, ti, ci, fl)
function tSpriteIdx(t) { return t.si !== undefined ? t.si : t.sprite_index; }
function tMatrixIdx(t) { return t.mi !== undefined ? t.mi : t.matrix_index; }
function tTileIdx(t) { return t.ti !== undefined ? t.ti : t.tile_index; }
function tColorIdx(t) { return t.ci !== undefined ? t.ci : t.color_index; }
function tFlags(t) { return t.fl !== undefined ? t.fl : t.flags; }

function getTileAt(tx, ty) {
  const order = activeLayerPathId
    ? [layerOrder.find(l => l.path_id === activeLayerPathId), ...layerOrder.filter(l => l.path_id !== activeLayerPathId)]
    : layerOrder;
  for (const info of order) {
    if (!info || !layerVisible[info.path_id]) continue;
    const data = getLayerData(info);
    if (!data || !data.tiles) continue;
    const tile = data.tiles.find(t => t.x === tx && t.y === ty);
    if (tile) return { ...tile, layer: info.name, path_id: info.path_id };
  }
  return null;
}

function selectTileAt(tx, ty) {
  selectedTile = getTileAt(tx, ty);
  updateProps();
  queueRender();
}

function selectObjectAt(wx, wy) {
  // Find nearest scene object within ~1.5 grid cells
  let best = null, bestDist = 2.25;  // 1.5^2
  for (const obj of sceneObjects) {
    const dx = obj.x - wx, dy = obj.y - wy;
    const d2 = dx*dx + dy*dy;
    if (d2 < bestDist) { bestDist = d2; best = obj; }
  }
  selectedObject = best;
  if (best) { selectedTile = null; updateProps(); queueRender(); }
}

function paintTile(tx, ty) {
  const info = layerOrder.find(l => l.path_id === activeLayerPathId);
  if (!info) return;
  const data = getLayerData(info);
  if (!data) return;
  if (data.tiles.find(t => t.x === tx && t.y === ty)) return;
  data.tiles.push({ x: tx, y: ty, z: 0, ti: 0, si: 0, mi: 0, ci: 0, fl: 1 });
  queueRender();
}

function eraseTile(tx, ty) {
  const info = layerOrder.find(l => l.path_id === activeLayerPathId);
  if (!info) return;
  const data = getLayerData(info);
  if (!data) return;
  const idx = data.tiles.findIndex(t => t.x === tx && t.y === ty);
  if (idx >= 0) { data.tiles.splice(idx, 1); queueRender(); }
}

// ===== PROPERTIES =====
function updateProps() {
  const el = document.getElementById('props-content');
  let html = '';
  if (selectedTile) {
    const si = tSpriteIdx(selectedTile), mi = tMatrixIdx(selectedTile);
    const ti = tTileIdx(selectedTile), ci = tColorIdx(selectedTile), fl = tFlags(selectedTile);
    html += `<h3>Tile</h3>`;
    html += prop('Layer', selectedTile.layer);
    html += prop('Position', `(${selectedTile.x}, ${selectedTile.y})`);
    html += prop('Tile Index', ti);
    html += prop('Sprite Index', si);
    html += prop('Matrix Index', mi);
    html += prop('Color Index', ci);
    html += prop('Flags', fl);

    // Show matrix transform
    const layerData = getLayerData(layerOrder.find(l => l.path_id === selectedTile.path_id) || {});
    if (layerData && layerData.matrices && layerData.matrices[mi]) {
      const m = layerData.matrices[mi];
      const desc = matrixDescription(m);
      html += prop('Transform', desc);
      html += `<div style="font-family:monospace;font-size:10px;margin:4px 0;color:#888">[${m[0]} ${m[1]}]<br>[${m[2]} ${m[3]}]</div>`;
    }

    // Show sprite preview
    const entry = spriteIndex[String(selectedTile.path_id)];
    if (entry) {
      const imgPath = entry.sprites[String(si)];
      if (imgPath) {
        html += `<img id="sprite-preview" src="${DATA_DIR}/${imgPath}" width="128">`;
      }
    }
  }
  if (activeLayerPathId) {
    const info = layerOrder.find(l => l.path_id === activeLayerPathId);
    if (info) {
      const data = getLayerData(info);
      html += `<h3>Layer: ${info.name}</h3>`;
      html += prop('Path ID', info.path_id);
      html += prop('Tiles', data ? data.tiles.length.toLocaleString() : '...');
      html += prop('Origin', `(${info.origin.x}, ${info.origin.y})`);
      html += prop('Size', `${info.size.x} x ${info.size.y}`);
      if (info.bbox) html += prop('Bbox', `(${info.bbox.min_x},${info.bbox.min_y}) to (${info.bbox.max_x},${info.bbox.max_y})`);
      const se = spriteIndex[String(info.path_id)];
      if (se) html += prop('Sprites', Object.keys(se.sprites).length);
    }
  }
  if (selectedObject) {
    const o = selectedObject;
    html += `<h3>Object: ${o.name}</h3>`;
    html += prop('Grid Position', `(${o.x}, ${o.y})`);
    html += prop('World Position', `(${o.world_x}, ${o.world_y})`);
    html += prop('Scale', `(${o.scale_x}, ${o.scale_y})`);
    html += prop('Rotation Z', `${o.rotation_z || 0}\u00B0`);
    if (o.course) html += prop('Course', o.course);
    html += prop('Enabled', o.sr_enabled);
    html += prop('Draw Mode', o.sr_draw_mode);
    html += prop('Sorting Order', o.sr_sorting_order);
    if (o.sr_flip_x || o.sr_flip_y) html += prop('Flip', `X:${o.sr_flip_x} Y:${o.sr_flip_y}`);
    if (o.sprite_name) html += prop('Sprite', o.sprite_name);
    if (o.sprite_w) html += prop('Sprite Size', `${o.sprite_w}x${o.sprite_h} PPU=${o.sprite_ppu}`);
    if (o.sprite) html += `<img id="sprite-preview" src="${DATA_DIR}/${o.sprite}" width="128">`;
  }
  if (!html) html = 'Select a tile or layer.';
  el.innerHTML = html;
}

function prop(label, val) {
  return `<div class="prop-row"><span class="prop-label">${label}</span><span class="prop-val">${val}</span></div>`;
}

function matrixDescription(m) {
  // m = [e00, e01, e10, e11]
  const [a, b, c, d] = m;
  if (a===1 && b===0 && c===0 && d===1) return 'Identity';
  if (a===-1 && b===0 && c===0 && d===-1) return 'Rotate 180';
  if (a===0 && b===1 && c===-1 && d===0) return 'Rotate 90 CW';
  if (a===0 && b===-1 && c===1 && d===0) return 'Rotate 90 CCW';
  if (a===-1 && b===0 && c===0 && d===1) return 'Flip H';
  if (a===1 && b===0 && c===0 && d===-1) return 'Flip V';
  if (a===0 && b===1 && c===1 && d===0) return 'Flip H + 90 CW';
  if (a===0 && b===-1 && c===-1 && d===0) return 'Flip H + 90 CCW';
  return `Custom [${a},${b},${c},${d}]`;
}

// ===== SCENE OBJECT RENDERING =====
function renderSceneObjects(objs, pixSize, vMinX, vMaxX, vMinY, vMaxY) {
  const showLabels = document.getElementById('labels-toggle').checked;
  for (const obj of objs) {
    const ox = obj.x, oy = obj.y;
    if (ox < vMinX - 20 || ox > vMaxX + 20 || oy < vMinY - 20 || oy > vMaxY + 20) continue;

    const s = worldToScreen(ox, oy);
    const img = obj.sprite ? sceneObjectImages[obj.sprite] : null;

    const srAlpha = (obj.sr_color && obj.sr_color.a !== undefined) ? obj.sr_color.a : 1;
    ctx.globalAlpha = srAlpha * 0.9;

    if (img && img.complete && img.naturalWidth > 0) {
      const objScaleX = Math.abs(obj.scale_x || 1);
      const objScaleY = Math.abs(obj.scale_y || 1);
      const ppu = obj.sprite_ppu || 1;

      let gridW, gridH;
      if ((obj.sr_draw_mode === 1 || obj.sr_draw_mode === 2) && obj.sr_size) {
        gridW = (obj.sr_size.x || 1) * objScaleX / 32;
        gridH = (obj.sr_size.y || 1) * objScaleY / 32;
      } else {
        gridW = (obj.sprite_w || img.naturalWidth) * objScaleX / ppu / 32;
        gridH = (obj.sprite_h || img.naturalHeight) * objScaleY / ppu / 32;
      }
      const drawW = gridW * pixSize;
      const drawH = gridH * pixSize;

      const pivotX = (obj.sprite_pivot && obj.sprite_pivot.x) ?? 0.5;
      const pivotY = (obj.sprite_pivot && obj.sprite_pivot.y) ?? 0.5;

      const cx = s.x;
      const cy = s.y;
      const rotDeg = obj.rotation_z || 0;
      const flipX = (obj.scale_x || 1) < 0 || obj.sr_flip_x;
      const flipY = (obj.scale_y || 1) < 0 || obj.sr_flip_y;

      ctx.save();
      ctx.translate(cx, cy);
      if (rotDeg !== 0) ctx.rotate(-rotDeg * Math.PI / 180);
      if (flipX || flipY) ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);

      const sr = obj.sr_color;
      if (sr && (sr.r < 0.99 || sr.g < 0.99 || sr.b < 0.99)) {
        ctx.globalAlpha *= Math.min(sr.r, sr.g, sr.b, 1);
      }

      ctx.imageSmoothingEnabled = pixSize < 16;
      ctx.drawImage(img, -pivotX * drawW, -(1 - pivotY) * drawH, drawW, drawH);
      ctx.restore();
    } else {
      const sz = Math.max(pixSize * 0.6, 3);
      ctx.fillStyle = '#ff44ff';
      ctx.beginPath();
      ctx.moveTo(s.x, s.y - sz);
      ctx.lineTo(s.x + sz, s.y);
      ctx.lineTo(s.x, s.y + sz);
      ctx.lineTo(s.x - sz, s.y);
      ctx.closePath();
      ctx.fill();
    }

    if (pixSize >= 6 && showLabels) {
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.max(8, Math.min(12, pixSize * 0.5))}px monospace`;
      ctx.fillText(obj.name, s.x - 10, s.y - pixSize * 0.3);
    }
    ctx.globalAlpha = 1;
  }
}

// ===== RENDERING =====
function render() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.fillStyle = '#111122';
  ctx.fillRect(0, 0, canvasW, canvasH);

  const showGrid = document.getElementById('grid-toggle').checked;
  const pixSize = cam.zoom * TILE_SIZE;

  // Visible world bounds
  const tl = screenToWorld(0, 0);
  const br = screenToWorld(canvasW, canvasH);
  const vMinX = Math.floor(Math.min(tl.x, br.x)) - 1;
  const vMaxX = Math.ceil(Math.max(tl.x, br.x)) + 1;
  const vMinY = Math.floor(Math.min(tl.y, br.y)) - 1;
  const vMaxY = Math.ceil(Math.max(tl.y, br.y)) + 1;

  // Grid
  if (showGrid && cam.zoom >= 8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let x = vMinX; x <= vMaxX; x++) {
      const s = worldToScreen(x, 0);
      ctx.beginPath(); ctx.moveTo(s.x, 0); ctx.lineTo(s.x, canvasH); ctx.stroke();
    }
    for (let y = vMinY; y <= vMaxY; y++) {
      const s = worldToScreen(0, y);
      ctx.beginPath(); ctx.moveTo(0, s.y); ctx.lineTo(canvasW, s.y); ctx.stroke();
    }
  }

  // Origin axes
  const ox = worldToScreen(0, 0);
  ctx.strokeStyle = 'rgba(255,80,80,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ox.x, 0); ctx.lineTo(ox.x, canvasH); ctx.stroke();
  ctx.strokeStyle = 'rgba(80,255,80,0.25)';
  ctx.beginPath(); ctx.moveTo(0, ox.y); ctx.lineTo(canvasW, ox.y); ctx.stroke();

  // Draw layers + scene objects interleaved by sorting order
  const useSprites = pixSize >= 3;
  const showObjs = showSceneObjects && document.getElementById('objects-toggle').checked;

  // Split scene objects into behind-tiles (sorting < 0) and front (sorting >= 0)
  let objsBehind = [], objsFront = [];
  if (showObjs) {
    const sorted = [...sceneObjects].sort((a, b) => (a.sr_sorting_order||0) - (b.sr_sorting_order||0));
    for (const obj of sorted) {
      if (obj.sr_enabled === false || obj.sr_enabled === 0) continue;
      if ((obj.sr_sorting_order || 0) < 0) objsBehind.push(obj);
      else objsFront.push(obj);
    }
  }

  // Render behind-tiles scene objects first
  if (objsBehind.length) renderSceneObjects(objsBehind, pixSize, vMinX, vMaxX, vMinY, vMaxY);

  for (const info of layerOrder) {
    if (!layerVisible[info.path_id]) continue;
    const data = getLayerData(info);
    if (!data || !data.tiles) continue;

    const isActive = info.path_id === activeLayerPathId;
    const alpha = isActive ? 1.0 : 0.6;
    const fallbackColor = LAYER_COLORS[info.name] || DEFAULT_COLOR;

    ctx.globalAlpha = alpha;

    // Get matrix array for this layer
    const matrices = data.matrices || [];

    // tile_size: 1 for standard 32-grid tiles, 2 for 64-grid tiles (moss, trees)
    const ts = info.tile_size || data.tile_size || 1;
    const tpx = pixSize * ts;

    if (tpx < 1.5) {
      ctx.fillStyle = fallbackColor;
      for (const t of data.tiles) {
        if (t.x < vMinX || t.x > vMaxX || t.y < vMinY || t.y > vMaxY) continue;
        const s = worldToScreen(t.x, t.y + ts);
        ctx.fillRect(s.x, s.y, Math.max(tpx, 1), Math.max(tpx, 1));
      }
    } else {
      for (const t of data.tiles) {
        if (t.x < vMinX || t.x > vMaxX || t.y < vMinY || t.y > vMaxY) continue;
        const sx = (t.x - cam.x) * cam.zoom + canvasW / 2;
        const sy = -(t.y + ts - cam.y) * cam.zoom + canvasH / 2;
        const sprIdx = tSpriteIdx(t);
        const matIdx = tMatrixIdx(t);

        let drawn = false;
        if (useSprites) {
          const img = getSpriteImage(info.path_id, sprIdx);
          if (img) {
            ctx.imageSmoothingEnabled = tpx < 16;

            const mat = matrices[matIdx];
            if (mat && !(mat[0]===1 && mat[1]===0 && mat[2]===0 && mat[3]===1)) {
              const cx = sx + tpx / 2;
              const cy = sy + tpx / 2;
              ctx.save();
              ctx.translate(cx, cy);
              ctx.transform(mat[0], -mat[2], -mat[1], mat[3], 0, 0);
              ctx.drawImage(img, -tpx/2, -tpx/2, tpx, tpx);
              ctx.restore();
            } else {
              ctx.drawImage(img, sx, sy, tpx, tpx);
            }
            drawn = true;
          }
        }

        if (!drawn) {
          ctx.fillStyle = fallbackColor;
          ctx.fillRect(sx, sy, tpx, tpx);
        }
      }
    }

    ctx.globalAlpha = 1;
  }

  // Render front scene objects (sorting >= 0)
  if (objsFront.length) renderSceneObjects(objsFront, pixSize, vMinX, vMaxX, vMinY, vMaxY);

  // Hover highlight
  if (hoverTile && cam.zoom >= 4) {
    const s = worldToScreen(hoverTile.x, hoverTile.y + 1);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x, s.y, pixSize, pixSize);
  }

  // Selection
  if (selectedTile) {
    const s = worldToScreen(selectedTile.x, selectedTile.y + 1);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x - 1, s.y - 1, pixSize + 2, pixSize + 2);
  }
  if (selectedObject) {
    const s = worldToScreen(selectedObject.x, selectedObject.y);
    ctx.strokeStyle = '#ff44ff';
    ctx.lineWidth = 2;
    const sz = Math.max(pixSize * 2, 10);
    ctx.strokeRect(s.x + pixSize/2 - sz/2, s.y - sz/2, sz, sz);
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ===== EXPORT =====
function exportLevel() {
  const levelLayers = layerIndex.filter(l => l.level === currentLevel);
  const exportData = [];
  for (const info of levelLayers) {
    const data = layers[info.file];
    if (data) exportData.push({ name: info.name, path_id: info.path_id, tiles: data.tiles });
  }
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `igtap_level${currentLevel}_export.json`; a.click();
  URL.revokeObjectURL(url);
}

init();
</script>
